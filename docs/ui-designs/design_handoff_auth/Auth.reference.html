  /* tick */

/* ---------------- validation + strength ---------------- */
function pwScore(p){
  if(!p) return 0;
  let s = 0;
  if(p.length >= 8) s++;
  if(p.length >= 12) s++;
  if(/[A-Z]/.test(p) && /[a-z]/.test(p)) s++;
  if(/\d/.test(p)) s++;
  if(/[^A-Za-z0-9]/.test(p)) s++;
  return Math.min(s, 4);
}
function pwLabel(s, t){
  if(s <= 1) return t("weak");
  if(s <= 3) return t("medium");
  return t("strong");
}
function pwColor(s){
  if(s <= 1) return "var(--danger)";
  if(s <= 3) return "var(--warn)";
  return "var(--accent)";
}

function validateLogin(v, t){
  const e = {};
  if(!v.email) e.email = t("err_required");
  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.email)) e.email = t("err_email");
  if(!v.password) e.password = t("err_required");
  return e;
}
function validateRegister(v, t){
  const e = {};
  if(!v.name) e.name = t("err_required");
  if(!v.email) e.email = t("err_required");
  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.email)) e.email = t("err_email");
  if(!v.password) e.password = t("err_required");
  else if(v.password.length < 10) e.password = t("err_pwd_short");
  if(v.password !== v.confirm) e.confirm = t("err_pwd_match");
  return e;
}

/* ---------------- hooks ---------------- */
function useAuthForm(mode, t){
  const [v, setV] = useState({ email:"", password:"", confirm:"", name:"", team:"Engineering", remember:true });
  const [errors, setErrors] = useState({});
  const [status, setStatus] = useState("idle"); // idle | submitting | error | success
  const [topError, setTopError] = useState("");

  useEffect(()=>{ setErrors({}); setTopError(""); setStatus("idle"); },[mode]);

  const set = (k) => (e) => setV(prev => ({...prev, [k]: e?.target ? e.target.value : e}));

  const submit = async (e) => {
    e.preventDefault();
    const errs = mode === "login" ? validateLogin(v,t) : validateRegister(v,t);
    setErrors(errs);
    if(Object.keys(errs).length) return;
    setStatus("submitting");
    setTopError("");
    // fake server
    await new Promise(r => setTimeout(r, 1100));
    if(mode === "login" && v.email === "fail@company.vn") {
      setStatus("error"); setTopError(t("err_creds")); return;
    }
    setStatus("success");
  };

  return { v, set, errors, status, topError, submit };
}

                      {showPw ? <I.eyeOff/> : <I.eye/>}

                  }/>

                )}

              {mode === "register" && (
                <Field id="confirm" label={t("confirm")} error={f.errors.confirm}>
                  <TextInput id="confirm"
                    type={showPw ? "text" : "password"}

                  (f.status === "submitting" || f.status === "success")

          <span>{t("footer_legal")}</span>
          <span className="flex items-center gap-3">

            <a className="hover:text-[color:var(--fg)]" href="#">status</a>
            <a className="hover:text-[color:var(--fg)]" href="#">contact</a>
          </span>
        </footer>
      </div>

      {/* RIGHT: brand panel — ảnh thương hiệu thuần túy, không có số liệu/hệ thống */}
      <aside className="hidden lg:flex relative overflow-hidden border-l"
        style={{borderColor:"var(--line)", background:"var(--fg)"}}>
        <div className="absolute inset-0 opacity-[0.07]"
          style={{

            backgroundSize: "40px 40px"

        <div
          className="absolute -top-40 -right-40 w-[520px] h-[520px] rounded-full blur-3xl opacity-30"
          style={{background: "var(--accent)"}}/>

        <div className="relative flex-1 p-12 flex flex-col justify-between" style={{color:"var(--bg)"}}>
          <div className="flex items-center gap-2">
            <span className="w-2 h-2 rounded-full" style={{background:"var(--accent)"}}/>
            <span className="mono text-[11px] uppercase tracking-[0.18em]" style={{color:"color-mix(in oklch, white 65%, transparent)"}}>
              my-agent · internal
            </span>
          </div>

          <div className="max-w-[420px]">
            <h2 className="text-[40px] leading-[1.08] font-semibold tracking-tight">
              {locale === "en"
                ? <>The internal workspace for <span style={{color:"var(--accent)"}}>AI agents</span>.</>
                : <>Không gian nội bộ cho <span style={{color:"var(--accent)"}}>AI agents</span>.</>}
            </h2>
            <p className="mt-4 text-[15px]" style={{color:"color-mix(in oklch, white 70%, transparent)"}}>
              {locale === "en"

          </div>

          <div className="mono text-[11px]" style={{color:"color-mix(in oklch, white 45%, transparent)"}}>
            © 2026 · Internal use only
          </div>
        </div>
      </aside>
    </div>
  );
}

/* ============================================================
   VARIANT B — Centered minimal card
   ============================================================ */
function VariantCard({ mode, setMode, t }){
  const f = useAuthForm(mode, t);
  const [showPw, setShowPw] = useState(false);
  const s = pwScore(f.v.password);

  return (
    <div className="min-h-screen w-full flex flex-col items-center justify-center px-5 py-10"
         style={{background:"var(--bg-2)"}}>

        <div className="flex items-center justify-center mb-6"><Logo/></div>

        <div className="rounded-xl border bg-white shadow-[0_1px_0_rgba(0,0,0,0.03),0_20px_40px_-24px_rgba(0,0,0,0.12)] overflow-hidden"
             style={{borderColor:"var(--line)"}}>
          {/* Tabs */}
          <div className="relative grid grid-cols-2 border-b" style={{borderColor:"var(--line-2)"}}>
            {["login","register"].map(m => (
              <button key={m} onClick={()=>setMode(m)}
                className={cn("py-3 text-[13px] font-medium transition",
                  mode === m ? "text-[color:var(--fg)]" : "text-[color:var(--fg-3)] hover:text-[color:var(--fg-2)]")}>
                {m === "login" ? t("login_tab") : t("register_tab")}
              </button>
            ))}
            <div className="absolute bottom-0 h-[2px] transition-all"
              style={{
                background: "var(--fg)",
                width: "50%",
                transform: `translateX(${mode === "login" ? "0%" : "100%"})`
              }}/>
          </div>

          <div className="p-6">
            <h2 className="text-[18px] font-semibold tracking-tight">
              {mode === "login" ? t("login_title") : t("reg_title")}
            </h2>
            <p className="text-[13px] mt-0.5" style={{color:"var(--fg-3)"}}>
              {mode === "login" ? t("login_sub") : t("reg_sub")}
            </p>

            <div className="mt-5"/>

            {f.topError && (
              <div className="mb-3 text-[12px] px-3 py-2 rounded border"
                style={{borderColor:"color-mix(in oklch, var(--danger) 30%, var(--line))",
                        background:"color-mix(in oklch, var(--danger) 7%, transparent)",
                        color:"var(--danger)"}}>
                {f.topError}
              </div>
            )}

            <form onSubmit={f.submit} noValidate className="space-y-2">
              {mode === "register" && (
                <Field id="b-name" label={t("name")} error={f.errors.name}>
                  <TextInput id="b-name" leading={<I.user/>} placeholder={t("name_ph")}
                    value={f.v.name} onChange={f.set("name")} invalid={!!f.errors.name}/>
                </Field>
              )}
              <Field id="b-email" label={t("email")} error={f.errors.email}>
                <TextInput id="b-email" type="email" leading={<I.mail/>}
                  placeholder={t("email_ph")} value={f.v.email}
                  onChange={f.set("email")} invalid={!!f.errors.email}/>
              </Field>
              <Field id="b-pw" label={t("password")}
                hint={mode === "login" ? <a href="#" className="hover:text-[color:var(--fg)]">{t("forgot")}</a> : null}
                error={f.errors.password}>
                <TextInput id="b-pw" type={showPw ? "text" : "password"}
                  leading={<I.lock/>}
                  placeholder={mode === "login" ? t("password_ph") : t("password_new_ph")}
                  value={f.v.password} onChange={f.set("password")}
                  invalid={!!f.errors.password}
                  trailing={
                    <button type="button" onClick={()=>setShowPw(x=>!x)}
                      className="pr-3 text-[color:var(--fg-3)] hover:text-[color:var(--fg)]">
                      {showPw ? <I.eyeOff/> : <I.eye/>}
                    </button>
                  }/>
                {mode === "register" && f.v.password && (
                  <div className="mt-2 flex items-center gap-2">
                    <div className="flex-1 flex gap-1">
                      {[0,1,2,3].map(i => (
                        <div key={i} className="flex-1 h-1 rounded-full transition-colors"
                             style={{background: i < s ? pwColor(s) : "var(--line)"}}/>

                    </div>
                    <div className="mono text-[11px]" style={{color: pwColor(s)}}>{pwLabel(s, t)}</div>

              </Field>
              {mode === "register" && (

                  <TextInput id="b-c" type={showPw ? "text" : "password"} leading={<I.lock/>}

                    onChange={f.set("confirm")} invalid={!!f.errors.confirm}/>
                </Field>

                {f.status === "success" ? (<><svg className="tick" width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M4 12l6 6L20 6" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"/></svg>{mode==="login"?t("ok_login"):t("ok_reg")}</>)

               style={{borderColor:"var(--line-2)", color:"var(--fg-3)", background:"var(--bg)"}}>
            <span className="flex items-center gap-1.5"><I.shield/> TLS 1.3 · internal auth</span>
            <span>v2.8.4</span>
          </div>
        </div>

        <p className="text-center text-[12px] mt-5" style={{color:"var(--fg-3)"}}>
          {t("footer_legal")}
        </p>
      </div>
    </div>
  );
}

/* ============================================================
   VARIANT C — Terminal
   ============================================================ */
function VariantTerminal({ mode, setMode, t }){
  const f = useAuthForm(mode, t);
  const [showPw, setShowPw] = useState(false);
  const [booted, setBooted] = useState(false);
  useEffect(()=>{ const id = setTimeout(()=>setBooted(true), 400); return ()=>clearTimeout(id); },[]);

  const cmd = mode === "login" ? "my-agent auth login" : "my-agent auth register";

  return (
    <div className="min-h-screen w-full grid place-items-center p-6 term">
      <div className="w-full max-w-[640px] rounded-lg overflow-hidden border shadow-2xl"
           style={{borderColor:"color-mix(in oklch, white 10%, var(--term-bg))"}}>
        {/* titlebar */}
        <div className="flex items-center gap-2 px-3 py-2"
             style={{background:"color-mix(in oklch, white 6%, var(--term-bg))"}}>
          <span className="w-3 h-3 rounded-full" style={{background:"#ff5f57"}}/>
          <span className="w-3 h-3 rounded-full" style={{background:"#febc2e"}}/>
          <span className="w-3 h-3 rounded-full" style={{background:"#28c840"}}/>
          <div className="flex-1 text-center mono text-[12px]" style={{color:"var(--term-dim)"}}>
            ~/my-agent — zsh — 96×24
          </div>
          <div className="flex items-center gap-1">
            {["login","register"].map(m => (
              <button key={m} onClick={()=>setMode(m)}
                className={cn("mono text-[11px] px-2 py-0.5 rounded transition",
                  mode === m ? "" : "opacity-50 hover:opacity-80"
                )}
                style={{
                  background: mode===m ? "color-mix(in oklch, var(--accent) 25%, var(--term-bg))" : "transparent",
                  color: mode===m ? "var(--term-fg)" : "var(--term-dim)"
                }}>
                {m}
              </button>
            ))}
          </div>
        </div>

        {/* body */}
        <div className="p-5 mono text-[13.5px] leading-[1.7]" style={{color:"var(--term-fg)"}}>
          <div style={{color:"var(--term-dim)"}}>
            <span style={{color:"var(--accent)"}}>●</span> connected to <span style={{color:"var(--term-fg)"}}>auth.company.vn</span> (v2.8.4)
          </div>
          <div style={{color:"var(--term-dim)"}}>
            tls: TLS_AES_256_GCM_SHA384 · cipher: strong · mfa: required
          </div>
          <div className="mt-2">
            <span style={{color:"var(--accent)"}}>$</span> {booted ? cmd : <span className="caret"/>}
          </div>

          <div className="mt-4 p-4 rounded border"
               style={{borderColor:"color-mix(in oklch, white 8%, transparent)",
                       background:"color-mix(in oklch, white 3%, transparent)"}}>
            <div className="text-[12px]" style={{color:"var(--term-dim)"}}>
              {mode === "login" ? t("login_sub") : t("reg_sub")}
            </div>

            <form onSubmit={f.submit} noValidate className="mt-3 space-y-2.5">
              {mode === "register" && (
                <TermField prompt="name" error={f.errors.name}>
                  <input value={f.v.name} onChange={f.set("name")}
                    placeholder={t("name_ph")} autoComplete="name"
                    className="flex-1 bg-transparent outline-none placeholder:text-[color:var(--term-dim)]"/>
                </TermField>
              )}

              <TermField prompt="email" error={f.errors.email}>
                <input type="email" value={f.v.email} onChange={f.set("email")}
                  placeholder={t("email_ph")} autoComplete="email"
                  className="flex-1 bg-transparent outline-none placeholder:text-[color:var(--term-dim)]"/>
              </TermField>

              <TermField prompt="password" error={f.errors.password}>
                <input type={showPw?"text":"password"} value={f.v.password} onChange={f.set("password")}
                  placeholder={mode==="login" ? t("password_ph") : t("password_new_ph")}
                  className="flex-1 bg-transparent outline-none placeholder:text-[color:var(--term-dim)]"/>
                <button type="button" onClick={()=>setShowPw(x=>!x)}
                  className="text-[11px] px-1.5 py-0.5 rounded hover:opacity-80"
                  style={{color:"var(--term-dim)", border:"1px solid color-mix(in oklch, white 10%, transparent)"}}>
                  {showPw ? "hide" : "show"}
                </button>
              </TermField>

              {mode === "register" && (
                <TermField prompt="confirm" error={f.errors.confirm}>
                  <input type={showPw?"text":"password"} value={f.v.confirm} onChange={f.set("confirm")}
                    className="flex-1 bg-transparent outline-none"/>
                </TermField>
              )}

              {f.topError && (
                <div className="text-[12.5px]" style={{color:"#ff8a7a"}}>
                  ✗ error: {f.topError}
                </div>
              )}

              <div className="pt-2 flex items-center justify-between gap-4">
                <div className="text-[11.5px]" style={{color:"var(--term-dim)"}}>
                  {mode === "login"
                    ? <><kbd className="px-1 py-0.5 rounded" style={{background:"color-mix(in oklch, white 8%, transparent)"}}>↵</kbd> to submit · <a href="#" className="underline underline-offset-2">{t("forgot")}</a></>
                    : "token → ~/.my-agent/config"}
                </div>
                <button type="submit" disabled={f.status==="submitting"||f.status==="success"}
                  className={cn("mono text-[12.5px] px-3.5 py-1.5 rounded flex items-center gap-2",
                    (f.status==="submitting"||f.status==="success") ? "opacity-70 cursor-wait" : "hover:brightness-110")}
                  style={{background:"var(--accent)", color:"var(--term-bg)", fontWeight:600}}>
                  {f.status === "success"
                    ? (<><span>✓</span> ok</>)
                    : f.status === "submitting"
                      ? (<><Spinner/> running…</>)
                      : (<><span>▶</span> {mode === "login" ? "login" : "register"}</>)}
                </button>
              </div>
            </form>
          </div>

          {/* log output */}
          <div className="mt-3 text-[12px]" style={{color:"var(--term-dim)"}}>
            {f.status === "submitting" && <div>[info] requesting token …</div>}
            {f.status === "success" && (
              <>
                <div style={{color:"var(--accent)"}}>[ok] authenticated as {f.v.email || "user@company.vn"}</div>
                <div>[info] redirecting to /dashboard …</div>
              </>
            )}
            {f.status === "idle" && <div>{mode === "login" ? t("hint") : t("tos")}</div>}
          </div>
        </div>
      </div>
    </div>
  );
}

function TermField({ prompt, error, children }){
  return (
    <div>
      <div className="flex items-center gap-2">
        <span style={{color:"var(--accent)", width: 68, flexShrink: 0}}>{prompt}</span>
        <span style={{color:"var(--term-dim)"}}>:</span>
        {children}
      </div>
      {error && <div className="ml-[76px] text-[11.5px]" style={{color:"#ff8a7a"}}>→ {error}</div>}
    </div>
  );
}

              ["vi","Tiếng Việt"],
              ["en","English"]
            ].map(([k,label])=>(
              <button key={k} onClick={()=>setLocale(k)}
                className={cn("py-1.5 rounded text-[12px] font-medium border transition",
                  locale === k ? "bg-[color:var(--fg)] text-white border-[color:var(--fg)]" : "hover:bg-[color:var(--bg-2)]"
                )}
                style={{borderColor: locale===k ? "var(--fg)" : "var(--line)"}}>
                {label}
              </button>
            ))}
          </div>
        </div>
        <div className="text-[11px] mono" style={{color:"var(--fg-3)"}}>
          tip: <span style={{color:"var(--fg-2)"}}>fail@company.vn</span> triggers login error
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   App
   ============================================================ */
function App(){
  const [variant, setVariant] = useState(window.TWEAKS?.variant || "split");
  const [mode, setMode] = useState(window.TWEAKS?.mode || "login");
  const [locale, setLocale] = useState(window.TWEAKS?.locale || "vi");
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const t = useT(locale);

  // Edit-mode protocol
  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent?.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const persist = (key, value) => {
    window.parent?.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: value } }, "*");
  };
  const setVariantP = (v) => { setVariant(v); persist("variant", v); };
  const setModeP    = (m) => { setMode(m);    persist("mode", m); };
  const setLocaleP  = (l) => { setLocale(l);  persist("locale", l); };

  const V = variant === "card" ? VariantCard : variant === "term" ? VariantTerminal : VariantSplit;
  return (
    <div data-screen-label={`${variant}-${mode}`}>
      <LangToggle locale={locale} setLocale={setLocaleP} variant={variant}/>
      <V mode={mode} setMode={setModeP} t={t} locale={locale}/>
      {tweaksOpen && (
        <TweaksPanel
          variant={variant} setVariant={setVariantP}
          mode={mode} setMode={setModeP}
          locale={locale} setLocale={setLocaleP}
          onClose={()=>setTweaksOpen(false)}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
