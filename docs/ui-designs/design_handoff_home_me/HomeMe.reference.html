/* ---------------- Header ---------------- */
function Header({ page, setPage, locale, setLocale, t, onSignOut, signingOut }) {
  const [menuOpen, setMenuOpen] = useState(false);
  const [notifOpen, setNotifOpen] = useState(false);
  const menuRef = useRef(null);
  const notifRef = useRef(null);

  useEffect(() => {
    const onClick = (e) => {
      if (menuRef.current && !menuRef.current.contains(e.target)) setMenuOpen(false);
      if (notifRef.current && !notifRef.current.contains(e.target)) setNotifOpen(false);
    };
    document.addEventListener("mousedown", onClick);
    return () => document.removeEventListener("mousedown", onClick);
  }, []);

  const nav = [
  { key: "home", label: t("nav_home"), icon: <I.home /> },
  { key: "agents", label: t("nav_agents"), icon: <I.bot /> }];

    <header className="sticky top-0 z-30 border-b backdrop-blur-md"
    style={{ borderColor: "var(--line)", background: "color-mix(in oklch, var(--bg) 82%, transparent)" }}>
      <div className="max-w-[1280px] mx-auto px-6 h-[58px] flex items-center gap-6">
        <Logo />

        <nav className="hidden md:flex items-center gap-1 ml-2">
          {nav.map((n) =>
          <button key={n.key}
          onClick={() => n.key === "home" ? setPage("home") : null}
          className={cn(
            "flex items-center gap-2 px-3 h-9 rounded-md text-[13px] font-medium transition",
            page === "home" && n.key === "home" ? "" : "hover:bg-[color:var(--bg-2)]"
          )}
          style={{
            color: page === "home" && n.key === "home" ? "var(--fg)" : "var(--fg-2)",
            background: page === "home" && n.key === "home" ? "var(--bg-2)" : "transparent"
          }}>
              <span style={{ color: page === "home" && n.key === "home" ? "var(--accent)" : "var(--fg-3)" }}>{n.icon}</span>
              {n.label}
            </button>
          )}
        </nav>

        {/* search */}
        <div className="flex-1 flex justify-center">
          <button className="hidden sm:flex items-center gap-2 w-full max-w-[360px] h-9 rounded-md border px-3 text-[13px] transition hover:border-[color:var(--fg-3)]"
          style={{ borderColor: "var(--line)", color: "var(--fg-3)", background: "var(--bg-2)" }}>
            <I.search />
            <span className="flex-1 text-left truncate">{t("cmd_hint")}</span>
            <span className="mono text-[11px] px-1.5 py-0.5 rounded border"
            style={{ borderColor: "var(--line)", background: "white", color: "var(--fg-2)" }}>{t("cmd_kbd")}</span>

              style={{ color: "var(--fg-2)" }}>
              <I.bell />
              <span className="absolute top-2 right-2 w-1.5 h-1.5 rounded-full" style={{ background: "var(--accent)" }} />
            </button>

            <div className="menu-in absolute right-0 top-11 w-[320px] rounded-xl border bg-white shadow-[0_10px_40px_-12px_rgba(0,0,0,0.18)] overflow-hidden"
            style={{ borderColor: "var(--line)" }}>
                <div className="px-4 py-3 border-b flex items-center justify-between" style={{ borderColor: "var(--line-2)" }}>
                  <span className="text-[13px] font-semibold">{t("notifs")}</span>
                  <span className="mono text-[11px] px-1.5 py-0.5 rounded" style={{ background: "var(--accent-2)", color: "var(--accent)" }}>3 new</span>
                </div>
                <div className="max-h-[260px] overflow-auto">

                ["SQL Copilot", locale === "vi" ? "Hoàn thành 3 phiên chạy" : "Finished 3 runs", "4m"],
                ["PR Reviewer", locale === "vi" ? "Lỗi timeout ở job #8821" : "Timeout on job #8821", "38m"],
                ["Onboarding Buddy", locale === "vi" ? "Mai H. đã chia sẻ agent" : "Mai H. shared an agent", "2h"]].

                      <span className="mt-1 w-1.5 h-1.5 rounded-full shrink-0" style={{ background: i === 1 ? "var(--danger)" : "var(--accent)" }} />
                      <div className="flex-1 min-w-0">

function AgentBadge({ color, name }) {
  const map = {
    a: ["oklch(0.95 0.04 150)", "oklch(0.45 0.12 150)"],
    b: ["oklch(0.94 0.03 260)", "oklch(0.42 0.12 260)"],
    c: ["oklch(0.95 0.05 75)", "oklch(0.45 0.14 75)"],
    d: ["oklch(0.94 0.04 320)", "oklch(0.44 0.13 320)"]
  };
  const [bg, fg] = map[color] || map.a;
  return (
    <div className="w-10 h-10 rounded-lg grid place-items-center mono text-[14px] font-semibold shrink-0"
    style={{ background: bg, color: fg }}>
      {name.split(" ").slice(0, 2).map((w) => w[0]).join("")}
    </div>);

}

function StatusDot({ s }) {
  if (s === "running") return (
    <span className="w-5 h-5 grid place-items-center rounded-full shrink-0" style={{ background: "var(--accent-2)", color: "var(--accent)" }}>
      <I.spin />
    </span>);

  if (s === "failed") return (
    <span className="w-5 h-5 grid place-items-center rounded-full shrink-0"
    style={{ background: "color-mix(in oklch, var(--danger) 15%, white)", color: "var(--danger)" }}>
      <I.x />
    </span>);

  return (
    <span className="w-5 h-5 grid place-items-center rounded-full shrink-0" style={{ background: "var(--accent-2)", color: "var(--accent)" }}>
      <I.check />
    </span>);

}

function Sparkline({ seed = 0 }) {
  // deterministic pseudo-random
  const pts = useMemo(() => {
    const out = [];
    let x = 12 + seed * 7.7;
    for (let i = 0; i < 20; i++) {x = (x * 9301 + 49297) % 233280;out.push(x / 233280);}
    return out;
  }, [seed]);
  const W = 160,H = 34,max = Math.max(...pts),min = Math.min(...pts);
  const d = pts.map((v, i) => {
    const px = i / (pts.length - 1) * W;
    const py = H - (v - min) / (max - min || 1) * (H - 4) - 2;
    return `${i === 0 ? "M" : "L"}${px.toFixed(1)},${py.toFixed(1)}`;
  }).join(" ");
  return (
    <svg viewBox={`0 0 ${W} ${H}`} className="mt-3 w-full h-[34px]">
      <path d={d} stroke="var(--accent)" strokeWidth="1.4" fill="none" strokeLinecap="round" strokeLinejoin="round" />
    </svg>);

}

          <div className="mono text-[10px] uppercase tracking-[0.16em] mb-2" style={{ color: "var(--fg-3)" }}>language</div>
          <div className="grid grid-cols-2 gap-1.5">
            {[["vi", "Tiếng Việt"], ["en", "English"]].map(([k, l]) =>
            <button key={k} onClick={() => setLocale(k)}
            className={cn("py-1.5 rounded text-[12px] font-medium border transition",
            locale === k ? "bg-[color:var(--fg)] text-white border-[color:var(--fg)]" : "hover:bg-[color:var(--bg-2)]")}
            style={{ borderColor: locale === k ? "var(--fg)" : "var(--line)" }}>
                {l}
              </button>
            )}
          </div>
        </div>
      </div>
    </div>);

}

/* ============================================================
   App
   ============================================================ */
function App() {
  const [page, setPage] = useState(window.TWEAKS?.page || "home");
  const [locale, setLocale] = useState(window.TWEAKS?.locale || "vi");
  const [signingOut, setSigningOut] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const t = useT(locale);

  useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", onMsg);
    window.parent?.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", onMsg);
  }, []);

  const persist = (k, v) => window.parent?.postMessage({ type: "__edit_mode_set_keys", edits: { [k]: v } }, "*");
  const setPageP = (p) => {setPage(p);persist("page", p);};
  const setLocaleP = (l) => {setLocale(l);persist("locale", l);};

  const onSignOut = () => {
    setSigningOut(true);
    setTimeout(() => {setSigningOut(false);alert(locale === "vi" ? "Đã đăng xuất (demo)" : "Signed out (demo)");}, 900);
  };

  return (
    <div data-screen-label={page}>
      <Header page={page} setPage={setPageP} locale={locale} setLocale={setLocaleP} t={t}
      onSignOut={onSignOut} signingOut={signingOut} />
      {page === "home" ? <HomePage t={t} locale={locale} setPage={setPageP} /> : <MePage t={t} locale={locale} />}
      {tweaksOpen && <TweaksPanel page={page} setPage={setPageP} locale={locale} setLocale={setLocaleP} onClose={() => setTweaksOpen(false)} />}
    </div>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
